name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: VitePress ${{ matrix.vitepress }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        vitepress: ['1.6.4', 'next']
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm install -D vitepress@${{ matrix.vitepress }} vue@latest
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
